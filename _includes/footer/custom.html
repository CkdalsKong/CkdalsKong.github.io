<!-- Scroll reveal animation -->
<script>
document.addEventListener("DOMContentLoaded", function () {
  var els = document.querySelectorAll("[data-animate]");
  if ("IntersectionObserver" in window) {
    var obs = new IntersectionObserver(function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add("is-visible");
          obs.unobserve(entry.target);
        }
      });
    }, { threshold: 0.12 });
    els.forEach(function (el) { obs.observe(el); });
  } else {
    els.forEach(function (el) { el.classList.add("is-visible"); });
  }

  /* Typing effect */
  var phrases = [
    "Personalized On-Device AI.",
    "Preference-Aware RAG.",
    "GUI Agents.",
    "Multimodal Memory.",
    "Efficient AI Systems."
  ];
  var typedEl = document.querySelector(".typed-text");
  if (!typedEl) return;
  var phraseIdx = 0, charIdx = 0, deleting = false;
  function tick() {
    var current = phrases[phraseIdx];
    if (deleting) {
      typedEl.textContent = current.substring(0, charIdx--);
      if (charIdx < 0) { deleting = false; phraseIdx = (phraseIdx + 1) % phrases.length; setTimeout(tick, 400); return; }
      setTimeout(tick, 35);
    } else {
      typedEl.textContent = current.substring(0, charIdx++);
      if (charIdx > current.length) { deleting = true; setTimeout(tick, 1800); return; }
      setTimeout(tick, 70);
    }
  }
  setTimeout(tick, 600);

  /* Publication abstract toggles */
  var abstractButtons = document.querySelectorAll(".pub-abstract-toggle");
  abstractButtons.forEach(function (btn) {
    btn.addEventListener("click", function () {
      var targetId = btn.getAttribute("data-target");
      var target = document.getElementById(targetId);
      if (!target) return;
      var open = target.classList.toggle("is-open");
      btn.textContent = open ? "Hide Abstract" : "Show Abstract";
    });
  });

  /* EPIC conceptual mini demo */
  var runDemoBtn = document.getElementById("run-epic-demo");
  var demoOut = document.getElementById("demo-output");
  if (runDemoBtn && demoOut) {
    runDemoBtn.addEventListener("click", function () {
      var queryEl = document.getElementById("demo-query");
      var prefEl = document.getElementById("demo-pref");
      var query = queryEl && queryEl.value ? queryEl.value.trim() : "";
      var pref = prefEl ? prefEl.value : "concise";
      if (!query) {
        demoOut.textContent = "Please enter a query first.";
        return;
      }

      var styleHint = {
        concise: "Return a short and practical answer with 2-3 bullets.",
        technical: "Return a technical answer with trade-offs and constraints.",
        budget: "Prioritize affordable options and justify cost/performance."
      }[pref] || "Return a practical answer.";

      demoOut.textContent =
        "[EPIC Pipeline]\n" +
        "1) Query received: " + query + "\n" +
        "2) Preference signal: " + pref + "\n" +
        "3) Preference-aligned memory chunks retrieved from compact index\n" +
        "4) Prompt assembled with user preference + relevant memory\n" +
        "5) Generation style policy: " + styleHint + "\n\n" +
        "[Example Response Skeleton]\n" +
        "- Option A: ...\n" +
        "- Option B: ...\n" +
        "- Why this matches preference: ...";
    });
  }
});
</script>
