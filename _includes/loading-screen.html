  text-align: center; width: min(400px, 84vw);
}

.cm-loader__title {
  font-family: "IBM Plex Sans", sans-serif;
  font-size: clamp(1.5rem, 4.5vw, 2.2rem);
  font-weight: 600; color: #fff;
  letter-spacing: -0.01em; margin-bottom: 0.4rem;
}

.cm-loader__sub {
