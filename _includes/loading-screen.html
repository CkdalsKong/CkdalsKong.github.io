<div id="cm-loader" aria-hidden="true">
  <div class="cm-loader__fragments" id="cm-fragments"></div>
  <div class="cm-loader__center">
    <div class="cm-loader__title">Loading Changmin Lee</div>
    <div class="cm-loader__sub">fetching memories from the edge<span class="cm-blink">_</span></div>
    <div class="cm-loader__bar-wrap">
      <div class="cm-loader__bar" id="cm-bar"></div>
    </div>
    <div class="cm-loader__status" id="cm-status"></div>
  </div>
</div>

<style>
#cm-loader {
  position: fixed; inset: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center;
  background: #f5f6fa;
  opacity: 1; transition: opacity 0.65s ease;
}
#cm-loader.done { opacity: 0; pointer-events: none; }

.cm-loader__center {
  position: relative; z-index: 2;
  text-align: center; width: min(400px, 84vw);
}

.cm-loader__title {
  font-family: "IBM Plex Sans", sans-serif;
  font-size: clamp(1.5rem, 4.5vw, 2.2rem);
  font-weight: 600; color: #1a1f3c;
  letter-spacing: -0.01em; margin-bottom: 0.4rem;
}

.cm-loader__sub {
  font-family: "IBM Plex Mono", monospace;
  font-size: 0.68rem; letter-spacing: 0.1em;
  color: #7b82b0;
  margin-bottom: 1.5rem;
}

.cm-blink { animation: blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

.cm-loader__bar-wrap {
  width: 100%; height: 2px;
  background: #e0e3f0;
  border-radius: 99px; overflow: hidden;
  margin-bottom: 0.8rem;
}

.cm-loader__bar {
  height: 100%; width: 0%;
  background: linear-gradient(90deg, #3b4ac8, #818cf8);
  border-radius: 99px;
  transition: width 0.45s cubic-bezier(.4,0,.2,1);
}

.cm-loader__status {
  font-family: "IBM Plex Mono", monospace;
  font-size: 0.65rem; color: #7b82b0;
  letter-spacing: 0.04em; min-height: 1.2em;
}

/* fragments */
.cm-loader__fragments { position: absolute; inset: 0; overflow: hidden; pointer-events: none; }

.cm-frag {
  position: absolute;
  display: inline-flex; align-items: center; gap: 0.4em;
  font-family: "IBM Plex Sans", sans-serif;
  font-size: 0.72rem; font-weight: 500;
  color: #3d4473;
  background: #fff;
  border: 1px solid #c8cce8;
  border-radius: 999px;
  padding: 0.3em 0.85em;
  white-space: nowrap;
  box-shadow: 0 2px 8px rgba(59,74,200,0.07);
  opacity: 0;
  transform: translateY(10px) scale(0.88);
  transition: opacity 0.5s ease, transform 0.5s cubic-bezier(.2,1,.3,1);
}
.cm-frag.in { opacity: 1; transform: translateY(0) scale(1); }
.cm-frag.converge {
  transition: opacity 0.5s ease, transform 0.55s cubic-bezier(.4,0,.6,1) !important;
  opacity: 0 !important;
}
